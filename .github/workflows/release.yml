name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

env:
  NODE_VERSION: "22"

jobs:
  publish:
    name: Publish npm + GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: npm ci
      - run: npm run version:check
      - name: Verify git tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "${TAG_VERSION}" != "${PKG_VERSION}" ]; then
            echo "tag/version mismatch: tag=${TAG_VERSION} package=${PKG_VERSION}"
            exit 1
          fi
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test:unit
      - run: npm run pack:check
      - name: Pack release tarball
        run: |
          npm pack
          sha256sum ./*.tgz > SHA256SUMS.txt
      - name: Publish npm package
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish GitHub release
        run: gh release create "${GITHUB_REF_NAME}" ./*.tgz SHA256SUMS.txt --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
