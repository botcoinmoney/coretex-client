name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Node 22 across the board: CoreTex uses Node 22 for the pinned launch toolchain.
env:
  NODE_VERSION: "22"

jobs:
  lint-type-unit:
    name: Type + Build + Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: npm run version:check
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test:unit
      - run: npm run pack:check
